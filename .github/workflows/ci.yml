name: CI

on: [ push, pull_request ]

jobs:

  unit:
    name: "Unit tests"
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-scripts

      - name: Tests - Unit
        run: ./bin/phpunit --testsuite unit

  lint:
    name: "Linter"
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-scripts

      - name: Tests - CS Fixer
        run: ./bin/php-cs-fixer fix --dry-run -vv

  phpstan:
    name: "PHPStan"
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpstan

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-scripts --ignore-platform-req=php

      - name: PHPStan
        run: phpstan analyse

  functional:
    name: "Functional tests"
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker images.
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: |
            docker-${{ runner.os }}-${{ hashFiles(
              'compose.yml',
              'docker/dockerfiles/apachephp/Dockerfile',
              'docker/dockerfiles/mysql/Dockerfile',
              'docker/dockerfiles/mysqltest/Dockerfile'
            ) }}

      - name: Tests - Functional
        run: |
          cp docker.env docker.env.local
          cp .env.dist .env
          mkdir -p ./htdocs/uploads -p ./tmp
          docker compose up -d
          docker compose exec --user localUser apachephp composer install --no-scripts
          docker compose run --rm node bash -c "npm install --legacy-peer-deps && npm run build"
          cat ./.docker/mysql/reset-db.sql | docker compose run -T --rm db /opt/mysql_no_db
          docker compose exec --user localUser apachephptest php bin/phinx migrate
          docker compose exec --user localUser apachephptest php bin/phinx seed:run
          docker compose exec --user localUser apachephptest ./bin/behat
          cat var/logs/test.deprecations.log | cut -d "]" -f 2 | awk '{$$1=$$1};1' | sort | uniq -c | sort -nr > var/logs/test.deprecations_grouped.log

      - uses: actions/upload-artifact@v4
        with:
          name: Functional tests - deprecated log - full
          path: var/logs/test.deprecations.log

      - uses: actions/upload-artifact@v4
        with:
          name: Functional tests - deprecated log - report
          path: var/logs/test.deprecations_grouped.log

  integration:
    name: "Integration tests"
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker images.
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: |
            docker-${{ runner.os }}-${{ hashFiles(
              'compose.yml',
              'Dockerfile',
              'docker/dockerfiles/mysql/Dockerfile',
              'docker/dockerfiles/mysqltest/Dockerfile'
            ) }}

      - name: Tests - Integration
        run: |
          cp docker.env docker.env.local
          cp -n .env.dist .env
          docker compose up -d
          docker compose exec --user localUser apachephp composer install --no-scripts
          docker compose exec -u localUser apachephp ./bin/phpunit --testsuite integration

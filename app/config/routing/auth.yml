app_login:
    path: /login
    defaults: {_controller: AppBundle\Controller\Auth\LoginAction}

auth_old_login:
    path: /admin/login
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
    defaults:
        route: 'app_login'
        permanent: true

app_logout:
    path: /logout

auth_old_logout:
    path: /admin/logout
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
    defaults:
        route: 'app_logout'
        permanent: true

app_password_reset:
    path: /password-reset
    defaults: {_controller: AppBundle\Controller\Auth\LostPasswordAction}

auth_old_password:
    path: /admin/password
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
    defaults:
        route: 'app_password_reset'
        permanent: true

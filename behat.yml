default:
  autoload:
    '': '%paths.base%/tests/behat/bootstrap'
  suites:
    web_features:
      paths:
        - '%paths.base%/tests/behat'
      contexts:
        - FeatureContext
        - Behat\MinkExtension\Context\MinkContext
  extensions:
    Robertfausk\Behat\PantherExtension: ~
    Behat\MinkExtension:
      base_url:  'https://apachephptest:80'
      files_path: '%paths.base%/tests/behat/files'
      default_session: browserkit_http
      javascript_session: panther
      sessions:
        browserkit_http:
          browserkit_http:
            http_client_parameters:
              verify_peer: false
              verify_host: false
        panther:
          panther:
            options:
              browser: 'chrome'
              webServerDir: '%paths.base%/htdocs'
              external_base_uri: 'https://apachephptest:80'
            manager_options:
              chromedriver_arguments:
                - '--headless'
                - '--disable-gpu'
                - '--no-sandbox'
                - '--disable-dev-shm-usage'
                - '--disable-extensions'
                - '--log-path=/var/www/html/chromedriver.log'
              capabilities:
                goog:chromeOptions:
                  args:
                    - --ignore-certificate-errors
              external_base_uri: 'https://apachephptest:80'
